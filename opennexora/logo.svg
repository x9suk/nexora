<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#4C1D95" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#purpleGradient)" filter="url(#shadow)"/>
  
  <!-- Interlocking circles -->
  <circle cx="70" cy="100" r="35" fill="none" stroke="url(#purpleGradient2)" stroke-width="8" opacity="0.9"/>
  <circle cx="130" cy="100" r="35" fill="none" stroke="url(#purpleGradient2)" stroke-width="8" opacity="0.9"/>
  
  <!-- Central diamond/arrow shape -->
  <path d="M100 65 L135 100 L100 135 L65 100 Z" fill="white" opacity="0.95"/>
  
  <!-- Inner arrows pointing outward -->
  <path d="M100 80 L120 100 L100 120 L80 100 Z" fill="url(#purpleGradient)" opacity="0.8"/>
  
  <!-- Top arrow -->
  <path d="M100 70 L110 85 L90 85 Z" fill="white" opacity="0.9"/>
  
  <!-- Bottom arrow -->
  <path d="M100 130 L110 115 L90 115 Z" fill="white" opacity="0.9"/>
  
  <!-- Left arrow -->
  <path d="M70 100 L85 90 L85 110 Z" fill="white" opacity="0.9"/>
  
  <!-- Right arrow -->
  <path d="M130 100 L115 90 L115 110 Z" fill="white" opacity="0.9"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="url(#purpleGradient2)"/>
  
  <!-- Text: OPENNEXORA -->
  <text x="100" y="170" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="url(#purpleGradient)" text-anchor="middle" letter-spacing="2">OPENNEXORA</text>
  
  <!-- Subtle outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#purpleGradient2)" stroke-width="2" opacity="0.5"/>
</svg>